[build]
  publish = "dist"
  command = "npm run build"

# Form handling
[[redirects]]
  from = "/contact"
  to = "/#contact"
  status = 301

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/*.wav"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Content-Type = "audio/wav"

[[headers]]
  for = "/*.mp3"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Content-Type = "audio/mpeg"
