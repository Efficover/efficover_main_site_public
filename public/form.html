<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Contact Form</title>
</head>
<body>
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="contact" />
        <div hidden>
            <input name="bot-field" />
        </div>
        
        <div>
            <label for="requestType">Request Type *</label>
            <select name="requestType" required>
                <option value="demo">Request a Demo</option>
                <option value="loi">Submit Letter of Intent (LOI)</option>
                <option value="pricing">Pricing Information</option>
                <option value="integration">Integration Questions</option>
                <option value="support">General Support</option>
            </select>
        </div>
        
        <div>
            <label for="name">Full Name *</label>
            <input type="text" name="name" required />
        </div>
        
        <div>
            <label for="email">Email Address *</label>
            <input type="email" name="email" required />
        </div>
        
        <div>
            <label for="practice">Practice Name *</label>
            <input type="text" name="practice" required />
        </div>
        
        <div>
            <label for="phone">Phone Number</label>
            <input type="tel" name="phone" />
        </div>
        
        <div>
            <label for="practiceSize">Practice Size</label>
            <select name="practiceSize">
                <option value="">Select practice size</option>
                <option value="1-5">1-5 providers</option>
                <option value="6-10">6-10 providers</option>
                <option value="11-20">11-20 providers</option>
                <option value="20+">20+ providers</option>
            </select>
        </div>
        
        <div>
            <label for="currentPMS">Current PMS</label>
            <select name="currentPMS">
                <option value="">Select your PMS</option>
                <option value="Dentrix">Dentrix</option>
                <option value="Eaglesoft">Eaglesoft</option>
                <option value="Open Dental">Open Dental</option>
                <option value="PracticeWorks">PracticeWorks</option>
                <option value="Carestream">Carestream</option>
                <option value="Other">Other</option>
            </select>
        </div>
        
        <div>
            <label for="timeline">Implementation Timeline</label>
            <select name="timeline">
                <option value="">Select timeline</option>
                <option value="Immediate">Immediate (within 30 days)</option>
                <option value="1-3 months">1-3 months</option>
                <option value="3-6 months">3-6 months</option>
                <option value="6+ months">6+ months</option>
            </select>
        </div>
        
        <div>
            <label for="budget">Budget Range</label>
            <select name="budget">
                <option value="">Select budget range</option>
                <option value="Under $5k">Under $5,000</option>
                <option value="$5k-$10k">$5,000 - $10,000</option>
                <option value="$10k-$25k">$10,000 - $25,000</option>
                <option value="$25k+">$25,000+</option>
            </select>
        </div>
        
        <div>
            <label for="preferredContact">Preferred Contact Method</label>
            <input type="radio" name="preferredContact" value="email" /> Email
            <input type="radio" name="preferredContact" value="phone" /> Phone
        </div>
        
        <div>
            <label for="message">Additional Information</label>
            <textarea name="message"></textarea>
        </div>
        
        <button type="submit">Submit</button>
    </form>
</body>
</html>
